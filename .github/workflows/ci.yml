name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        working-directory: canvas-backend
        run: pip install -r requirements.txt
      - name: Compile backend
        working-directory: canvas-backend
        run: python -m py_compile main.py schemas.py
      - name: Run backend tests
        working-directory: canvas-backend
        run: python -m unittest discover -s tests

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: canvas-frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: canvas-frontend
        run: npm ci
      - name: Lint frontend
        working-directory: canvas-frontend
        run: npm run lint
      - name: Build frontend
        working-directory: canvas-frontend
        run: npm run build
